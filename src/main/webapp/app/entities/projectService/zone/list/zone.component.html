<div class="zones-page">
  <div class="zones-content">
    <div class="zones-header">
      <h2 data-cy="ZoneHeading" id="page-heading">
        <span class="text-uppercase">Zones</span>
      </h2>

      <div class="zones-header-actions">
        <button (click)="refresh()" [disabled]="isLoading" class="btn-zone-refresh" title="Actualiser" type="button">
          <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        </button>
        <button [routerLink]="['/zone/new']" class="btn-zone-new" data-cy="entityCreateButton" id="jh-create-entity">
          <fa-icon icon="plus"></fa-icon>
          <span>Nouvelle zone</span>
        </button>
      </div>
    </div>

    <jhi-alert-error></jhi-alert-error>
    <jhi-alert></jhi-alert>

    <!-- Toolbar -->
    <div class="zones-toolbar-wrapper">
      <div class="zones-toolbar-row">
        <div class="zones-search">
          <fa-icon icon="search" class="zones-search-icon"></fa-icon>
          <input
            (ngModelChange)="filterZones()"
            [(ngModel)]="searchTerm"
            class="form-control zones-search-input"
            placeholder="Rechercher..."
            type="text"
          />
        </div>

        <div class="zones-toolbar-right">
          <span class="zones-count">{{ filteredZones?.length ?? 0 }} résultat(s)</span>

          <div class="zones-view-toggle">
            <button type="button" [class.active]="viewMode === 'grid'" (click)="viewMode = 'grid'" title="Vue grille">
              <fa-icon icon="th-large"></fa-icon>
            </button>
            <button type="button" [class.active]="viewMode === 'list'" (click)="viewMode = 'list'" title="Vue liste">
              <fa-icon icon="list"></fa-icon>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- No result -->
    <div *ngIf="filteredZones?.length === 0" class="alert alert-warning" id="no-result">
      <span>Aucune zone trouvée</span>
    </div>

    <!-- Card Grid -->
    <div *ngIf="filteredZones && filteredZones.length > 0 && viewMode === 'grid'" class="zones-grid" id="entities">
      <div
        *ngFor="let zone of filteredZones; trackBy: trackId"
        class="zone-card"
        data-cy="entityTable"
        title="Double-cliquer pour éditer"
        (dblclick)="goToEdit(zone)"
      >
        <div class="zone-card-header">
          <span class="zone-ref">#{{ zone.id }}</span>
        </div>

        <h3 class="zone-title">{{ zone.nom || 'Sans nom' }}</h3>

        <div class="zone-details">
          <div *ngIf="zone.ville?.nom">
            <fa-icon icon="flag" class="text-muted"></fa-icon>
            <span>{{ zone.ville?.nom }}</span>
          </div>
        </div>

        <div class="zone-card-footer">
          <div class="card-actions">
            <button
              (click)="$event.stopPropagation(); delete(zone)"
              class="action-btn btn-delete"
              data-cy="entityDeleteButton"
              title="Supprimer"
              type="button"
            >
              <fa-icon icon="trash-alt"></fa-icon>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- List View -->
    <div *ngIf="filteredZones && filteredZones.length > 0 && viewMode === 'list'" class="zones-table-wrapper" id="entities-list">
      <table class="zones-table" aria-describedby="page-heading">
        <thead>
          <tr (sortChange)="navigateToWithComponentValues()" [(ascending)]="ascending" [(predicate)]="predicate" jhiSort>
            <th jhiSortBy="nom" scope="col">
              <div class="d-flex"><span>Nom</span><fa-icon class="p-1" icon="sort"></fa-icon></div>
            </th>
            <th jhiSortBy="ville.nom" scope="col">
              <div class="d-flex"><span>Ville</span><fa-icon class="p-1" icon="sort"></fa-icon></div>
            </th>
            <th scope="col"></th>
          </tr>
        </thead>
        <tbody>
          <tr
            *ngFor="let zone of filteredZones; trackBy: trackId"
            data-cy="entityTable"
            title="Double-cliquer pour éditer"
            (dblclick)="goToEdit(zone)"
          >
            <td>{{ zone.nom }}</td>
            <td>{{ zone.ville?.nom || '-' }}</td>
            <td class="text-end" (click)="$event.stopPropagation()">
              <div class="table-actions">
                <button (click)="delete(zone)" class="action-btn btn-delete" data-cy="entityDeleteButton" title="Supprimer" type="button">
                  <fa-icon icon="trash-alt"></fa-icon>
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Pagination -->
    <div *ngIf="filteredZones && filteredZones.length > 0">
      <div class="d-flex justify-content-center">
        <jhi-item-count [params]="{ page: page, totalItems: totalItems, itemsPerPage: itemsPerPage }"></jhi-item-count>
      </div>
      <div class="d-flex justify-content-center">
        <ngb-pagination
          (pageChange)="navigateToPage($event)"
          [boundaryLinks]="true"
          [collectionSize]="totalItems"
          [maxSize]="5"
          [pageSize]="itemsPerPage"
          [page]="page"
          [rotate]="true"
        ></ngb-pagination>
      </div>
    </div>
  </div>
</div>
