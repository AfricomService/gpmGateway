<div class="row justify-content-center">
  <div class="col-md-12 col-lg-10">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        *ngIf="editForm.controls.id.value === null"
        style="padding-top: 2em; text-transform: uppercase; font-style: italic"
        id="jhi-client-heading"
        class="mb-4"
      >
        CREATION D'UN PROJET
      </h2>

      <h2
        *ngIf="editForm.controls.id.value !== null"
        style="padding-top: 2em; text-transform: uppercase; font-style: italic"
        id="jhi-client-heading"
        class="mb-4"
      >
        EDITION D'UN PROJET
      </h2>
      <jhi-alert-error></jhi-alert-error>

      <div class="row">
        <!-- Section: Informations Générales -->
        <div class="col-lg-6 mb-4">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-light">
              <h5 class="mb-0">Informations Générales</h5>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="col-md-12 mb-3" *ngIf="editForm.controls.id.value !== null">
                  <label class="form-label font-weight-bold" jhiTranslate="global.field.id" for="field_id">ID</label>
                  <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
                </div>

                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.numAffaire"
                    for="field_numAffaire"
                    >Num Affaire</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    name="numAffaire"
                    id="field_numAffaire"
                    data-cy="numAffaire"
                    formControlName="numAffaire"
                  />
                  <div
                    *ngIf="
                      editForm.get('numAffaire')!.invalid && (editForm.get('numAffaire')!.dirty || editForm.get('numAffaire')!.touched)
                    "
                  >
                    <small
                      class="form-text text-danger"
                      *ngIf="editForm.get('numAffaire')?.errors?.required"
                      jhiTranslate="entity.validation.required"
                    >
                      Ce champ est obligatoire.
                    </small>
                    <small
                      class="form-text text-danger"
                      [hidden]="!editForm.get('numAffaire')?.errors?.number"
                      jhiTranslate="entity.validation.number"
                    >
                      Ce champ doit être un nombre.
                    </small>
                  </div>
                </div>

                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.designationAffaire"
                    for="field_designationAffaire"
                    >Designation Affaire</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="designationAffaire"
                    id="field_designationAffaire"
                    data-cy="designationAffaire"
                    formControlName="designationAffaire"
                  />
                  <div
                    *ngIf="
                      editForm.get('designationAffaire')!.invalid &&
                      (editForm.get('designationAffaire')!.dirty || editForm.get('designationAffaire')!.touched)
                    "
                  >
                    <small
                      class="form-text text-danger"
                      *ngIf="editForm.get('designationAffaire')?.errors?.required"
                      jhiTranslate="entity.validation.required"
                    >
                      Ce champ est obligatoire.
                    </small>
                  </div>
                </div>

                <div class="col-md-12 mb-3">
                  <label class="form-label font-weight-bold" jhiTranslate="gpmGatewayApp.projectServiceAffaire.statut" for="field_statut"
                    >Statut</label
                  >
                  <select class="form-control" name="statut" formControlName="statut" id="field_statut" data-cy="statut">
                    <option [ngValue]="null">{{ 'gpmGatewayApp.StatutAffaire.null' | translate }}</option>
                    <option *ngFor="let statutAffaire of statutAffaireValues" [value]="statutAffaire">
                      {{ 'gpmGatewayApp.StatutAffaire.' + statutAffaire | translate }}
                    </option>
                  </select>
                  <div *ngIf="editForm.get('statut')!.invalid && (editForm.get('statut')!.dirty || editForm.get('statut')!.touched)">
                    <small
                      class="form-text text-danger"
                      *ngIf="editForm.get('statut')?.errors?.required"
                      jhiTranslate="entity.validation.required"
                    >
                      Ce champ est obligatoire.
                    </small>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Section: Détails Commerciaux -->
        <div class="col-lg-6 mb-4">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-light">
              <h5 class="mb-0">Détails Commerciaux</h5>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.bonDeCommande"
                    for="field_bonDeCommande"
                    >Bon De Commande</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="bonDeCommande"
                    id="field_bonDeCommande"
                    data-cy="bonDeCommande"
                    formControlName="bonDeCommande"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label font-weight-bold" jhiTranslate="gpmGatewayApp.projectServiceAffaire.montant" for="field_montant"
                    >Montant</label
                  >
                  <input type="number" class="form-control" name="montant" id="field_montant" data-cy="montant" formControlName="montant" />
                </div>

                <div class="col-md-6 mb-3">
                  <label class="form-label font-weight-bold" jhiTranslate="gpmGatewayApp.projectServiceAffaire.devise" for="field_devise"
                    >Devise</label
                  >
                  <input type="text" class="form-control" name="devise" id="field_devise" data-cy="devise" formControlName="devise" />
                </div>

                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.montantVente"
                    for="field_montantVente"
                    >Montant Vente</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    name="montantVente"
                    id="field_montantVente"
                    data-cy="montantVente"
                    formControlName="montantVente"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.montantBudgetaireMateriel"
                    for="field_montantBudgetaireMateriel"
                    >Montant Budgetaire Materiel</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    name="montantBudgetaireMateriel"
                    id="field_montantBudgetaireMateriel"
                    data-cy="montantBudgetaireMateriel"
                    formControlName="montantBudgetaireMateriel"
                  />
                </div>

                <div class="col-md-6 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.montantBudgetaireService"
                    for="field_montantBudgetaireService"
                    >Montant Budgetaire Service</label
                  >
                  <input
                    type="number"
                    class="form-control"
                    name="montantBudgetaireService"
                    id="field_montantBudgetaireService"
                    data-cy="montantBudgetaireService"
                    formControlName="montantBudgetaireService"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Section: Dates & Exécution -->
        <div class="col-lg-6 mb-4">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-light">
              <h5 class="mb-0">Dates & Exécution</h5>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.dateDebut"
                    for="field_dateDebut"
                    >Date Debut</label
                  >
                  <div class="input-group">
                    <input
                      id="field_dateDebut"
                      data-cy="dateDebut"
                      type="text"
                      class="form-control"
                      name="dateDebut"
                      ngbDatepicker
                      #dateDebutDp="ngbDatepicker"
                      formControlName="dateDebut"
                    />
                    <button type="button" class="btn btn-secondary" (click)="dateDebutDp.toggle()">
                      <fa-icon icon="calendar-alt"></fa-icon>
                    </button>
                  </div>
                </div>

                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.dateCloture"
                    for="field_dateCloture"
                    >Date Cloture</label
                  >
                  <div class="input-group">
                    <input
                      id="field_dateCloture"
                      data-cy="dateCloture"
                      type="text"
                      class="form-control"
                      name="dateCloture"
                      ngbDatepicker
                      #dateClotureDp="ngbDatepicker"
                      formControlName="dateCloture"
                    />
                    <button type="button" class="btn btn-secondary" (click)="dateClotureDp.toggle()">
                      <fa-icon icon="calendar-alt"></fa-icon>
                    </button>
                  </div>
                </div>

                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.datePassageExecution"
                    for="field_datePassageExecution"
                    >Date Passage Execution</label
                  >
                  <div class="input-group">
                    <input
                      id="field_datePassageExecution"
                      data-cy="datePassageExecution"
                      type="text"
                      class="form-control"
                      name="datePassageExecution"
                      ngbDatepicker
                      #datePassageExecutionDp="ngbDatepicker"
                      formControlName="datePassageExecution"
                    />
                    <button type="button" class="btn btn-secondary" (click)="datePassageExecutionDp.toggle()">
                      <fa-icon icon="calendar-alt"></fa-icon>
                    </button>
                  </div>
                </div>

                <div class="col-md-12 mb-3 d-flex align-items-center">
                  <label
                    class="form-check-label font-weight-bold me-3"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.lieuMultipleParMission"
                    for="field_lieuMultipleParMission"
                    >Lieu Multiple Par Mission</label
                  >
                  <input
                    type="checkbox"
                    class="form-check-input m-0"
                    style="width: 1.8rem; height: 1.8rem; cursor: pointer"
                    name="lieuMultipleParMission"
                    id="field_lieuMultipleParMission"
                    data-cy="lieuMultipleParMission"
                    formControlName="lieuMultipleParMission"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Split Section: Client & Responsable -->
        <div class="col-lg-6 mb-4 d-flex flex-column" style="gap: 1.5rem">
          <!-- Section: Client -->
          <div class="card shadow-sm bg-white">
            <div class="card-header bg-light">
              <h5 class="mb-0">Client</h5>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="col-md-12 mb-3">
                  <label class="form-label font-weight-bold" jhiTranslate="gpmGatewayApp.projectServiceAffaire.client" for="field_client"
                    >Client</label
                  >
                  <ng-select
                    id="field_client"
                    data-cy="client"
                    name="client"
                    formControlName="client"
                    [searchable]="true"
                    [compareWith]="compareClient"
                    class="custom-ng-select"
                    placeholder="Rechercher un client..."
                  >
                    <ng-option [value]="null" *ngIf="!editForm.get('client')!.value"></ng-option>
                    <ng-option [value]="clientOption" *ngFor="let clientOption of clientsSharedCollection">
                      {{ clientOption.raisonSociale }}
                    </ng-option>
                  </ng-select>
                  <div *ngIf="editForm.get(['client'])!.invalid && (editForm.get(['client'])!.dirty || editForm.get(['client'])!.touched)">
                    <small
                      class="form-text text-danger"
                      *ngIf="editForm.get(['client'])?.errors?.required"
                      jhiTranslate="entity.validation.required"
                    >
                      Ce champ est obligatoire.
                    </small>
                  </div>
                </div>
              </div>
            </div>
          </div>

          <!-- Section: Responsable -->
          <div class="card shadow-sm bg-white flex-grow-1">
            <div class="card-header bg-light">
              <h5 class="mb-0">Responsable</h5>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.responsableProjetId"
                    for="field_responsableProjetId"
                    [ngbTooltip]="'gpmGatewayApp.projectServiceAffaire.help.responsableProjetId' | translate"
                    >Responsable Projet Id</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="responsableProjetId"
                    id="field_responsableProjetId"
                    data-cy="responsableProjetId"
                    formControlName="responsableProjetId"
                  />
                </div>

                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceAffaire.responsableProjetUserLogin"
                    for="field_responsableProjetUserLogin"
                    >Responsable Projet User Login</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="responsableProjetUserLogin"
                    id="field_responsableProjetUserLogin"
                    data-cy="responsableProjetUserLogin"
                    formControlName="responsableProjetUserLogin"
                  />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end mb-4">
        <button
          type="button"
          id="cancel-save"
          data-cy="entityCreateCancelButton"
          class="btn btn-outline-secondary me-2"
          (click)="previousState()"
        >
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
