<div class="row justify-content-center">
  <div class="col-md-12 col-lg-10">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        *ngIf="editForm.controls.id.value === null"
        style="padding-top: 2em; text-transform: uppercase; font-style: italic"
        id="jhi-client-heading"
        data-cy="ClientCreateUpdateHeading"
        class="mb-4"
      >
        CREATION D'UN CLIENT
      </h2>

      <h2
        *ngIf="editForm.controls.id.value !== null"
        style="padding-top: 2em; text-transform: uppercase; font-style: italic"
        id="jhi-client-heading"
        data-cy="ClientCreateUpdateHeading"
        class="mb-4"
      >
        EDITION D'UN CLIENT
      </h2>

      <jhi-alert-error></jhi-alert-error>

      <div class="row">
        <!-- Section: Informations Générales -->
        <div class="col-lg-6 mb-4">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-light">
              <h5 class="mb-0">Informations Générales</h5>
            </div>
            <div class="card-body">
              <div class="row">
                <!--                <div class="col-md-12 mb-3" *ngIf="editForm.controls.id.value !== null">-->
                <!--                  <label class="form-label font-weight-bold" jhiTranslate="global.field.id" for="field_id">ID</label>-->
                <!--                  <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />-->
                <!--                </div>-->

                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceClient.raisonSociale"
                    for="field_raisonSociale"
                    >Raison Sociale</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="raisonSociale"
                    id="field_raisonSociale"
                    data-cy="raisonSociale"
                    formControlName="raisonSociale"
                  />
                  <div
                    *ngIf="
                      editForm.get('raisonSociale')!.invalid &&
                      (editForm.get('raisonSociale')!.dirty || editForm.get('raisonSociale')!.touched)
                    "
                  >
                    <small
                      class="form-text text-danger"
                      *ngIf="editForm.get('raisonSociale')?.errors?.required"
                      jhiTranslate="entity.validation.required"
                    >
                      Ce champ est obligatoire.
                    </small>
                  </div>
                </div>

                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceClient.identifiantUnique"
                    for="field_identifiantUnique"
                    >Identifiant Unique</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="identifiantUnique"
                    id="field_identifiantUnique"
                    data-cy="identifiantUnique"
                    formControlName="identifiantUnique"
                  />
                  <div
                    *ngIf="
                      editForm.get('identifiantUnique')!.invalid &&
                      (editForm.get('identifiantUnique')!.dirty || editForm.get('identifiantUnique')!.touched)
                    "
                  >
                    <small
                      class="form-text text-danger"
                      *ngIf="editForm.get('identifiantUnique')?.errors?.required"
                      jhiTranslate="entity.validation.required"
                    >
                      Ce champ est obligatoire.
                    </small>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>

        <!-- Section: Contact -->
        <div class="col-lg-6 mb-4">
          <div class="card shadow-sm h-100">
            <div class="card-header bg-light">
              <h5 class="mb-0">Contact & Coordonnées</h5>
            </div>
            <div class="card-body">
              <div class="row">
                <div class="col-md-12 mb-3">
                  <label class="form-label font-weight-bold" jhiTranslate="gpmGatewayApp.projectServiceClient.adresse" for="field_adresse"
                    >Adresse</label
                  >
                  <input type="text" class="form-control" name="adresse" id="field_adresse" data-cy="adresse" formControlName="adresse" />
                  <div *ngIf="editForm.get('adresse')!.invalid && (editForm.get('adresse')!.dirty || editForm.get('adresse')!.touched)">
                    <small
                      class="form-text text-danger"
                      *ngIf="editForm.get('adresse')?.errors?.required"
                      jhiTranslate="entity.validation.required"
                    >
                      Ce champ est obligatoire.
                    </small>
                  </div>
                </div>

                <div class="col-md-12 mb-3">
                  <label
                    class="form-label font-weight-bold"
                    jhiTranslate="gpmGatewayApp.projectServiceClient.telephone"
                    for="field_telephone"
                    >Telephone</label
                  >
                  <input
                    type="text"
                    class="form-control"
                    name="telephone"
                    id="field_telephone"
                    data-cy="telephone"
                    formControlName="telephone"
                  />
                </div>

                <div class="col-md-12 mb-3">
                  <label class="form-label font-weight-bold" jhiTranslate="gpmGatewayApp.projectServiceClient.fax" for="field_fax"
                    >Fax</label
                  >
                  <input type="text" class="form-control" name="fax" id="field_fax" data-cy="fax" formControlName="fax" />
                </div>

                <div class="col-md-12 mb-3">
                  <label class="form-label font-weight-bold" jhiTranslate="gpmGatewayApp.projectServiceClient.email" for="field_email"
                    >Email</label
                  >
                  <input type="email" class="form-control" name="email" id="field_email" data-cy="email" formControlName="email" />
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="d-flex justify-content-end mb-4">
        <button
          type="button"
          id="cancel-save"
          data-cy="entityCreateCancelButton"
          class="btn btn-outline-secondary me-2"
          (click)="previousState()"
        >
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
