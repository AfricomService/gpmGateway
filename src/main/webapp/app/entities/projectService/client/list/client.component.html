<div style="padding-top: 4em">
  <!-- 🔢 STATS -->
  <div class="row g-3 mb-4">
    <div
      class="col-md-3"
      *ngFor="
        let stat of [
          { label: 'Clients', value: totalItems, icon: 'users', color: 'text-primary' },
          { label: 'Affaires liées', value: 10, icon: 'briefcase', color: 'text-info' },
          { label: 'Missions liées', value: 18, icon: 'tasks', color: 'text-warning' },
          { label: 'Agences', value: 5, icon: 'building', color: 'text-success' }
        ]
      "
    >
      <div class="card shadow-sm border-0 rounded-4 p-3">
        <div class="d-flex justify-content-between align-items-center">
          <div>
            <small class="text-muted">{{ stat.label }}</small>
            <h4 class="fw-bold mb-0">{{ stat.value }}</h4>
          </div>
          <!--          <div class="icon-box bg-light rounded-3 p-2">-->
          <!--            <fa-icon [icon]="stat.icon" class="{{ stat.color }}"></fa-icon>-->
          <!--          </div>-->
        </div>
      </div>
    </div>
  </div>

  <!-- 🔍 HEADER + SEARCH -->
  <div class="d-flex justify-content-between align-items-center mb-5">
    <h4 class="fw-bold mb-0">Clients</h4>

    <div class="d-flex align-items-center gap-2">
      <!-- Search -->
      <div class="input-group">
        <span class="input-group-text">Recherche</span>
        <input type="text" class="form-control" placeholder="Rechercher..." />
      </div>

      <!-- Toggle -->
      <!--      <button class="btn btn-light border rounded-3">-->
      <!--        Vue-->
      <!--      </button>-->

      <!-- Create -->
      <button class="btn btn-primary rounded-3 w-60" [routerLink]="['/client/new']">Nouveau Client</button>
    </div>
  </div>

  <!-- ⚠️ NO RESULT -->
  <div class="alert alert-warning" *ngIf="clients?.length === 0">Aucun Client trouvé</div>

  <!-- 🧾 CLIENT CARDS -->
  <div class="row g-4" *ngIf="clients && clients.length > 0">
    <div class="col-xl-4 col-md-6 col-12" *ngFor="let client of clients; trackBy: trackId">
      <div class="card border-2 shadow-sm rounded-4 h-100 p-3 client-card">
        <!-- Title -->
        <h5 class="fw-bold mb-1">
          {{ client.raisonSociale }}
        </h5>

        <!-- Email -->
        <div class="text-muted small mb-1">
          {{ client.email }}
        </div>

        <!-- Phone -->
        <div class="text-muted small mb-3">
          {{ client.telephone }}
        </div>

        <!-- Stats -->
        <div class="d-flex gap-3 small text-muted mb-3">
          <span>2 affaire(s)</span>
          <span>6 mission(s)</span>
        </div>

        <!-- Actions -->
        <div class="d-flex justify-content-end gap-2 mt-auto">
          <button class="btn btn-light btn-sm rounded-3" [routerLink]="['/client', client.id, 'view']">Consulter</button>

          <button class="btn btn-light btn-sm rounded-3" [routerLink]="['/client', client.id, 'edit']">Éditer</button>

          <button class="btn btn-light btn-sm rounded-3 text-danger" (click)="delete(client)">Supprimer</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 📄 PAGINATION -->
  <div *ngIf="clients && clients.length > 0" class="mt-4">
    <div class="d-flex justify-content-center">
      <jhi-item-count [params]="{ page: page, totalItems: totalItems, itemsPerPage: itemsPerPage }"></jhi-item-count>
    </div>

    <div class="d-flex justify-content-center">
      <ngb-pagination
        [collectionSize]="totalItems"
        [page]="page"
        [pageSize]="itemsPerPage"
        [maxSize]="5"
        [rotate]="true"
        [boundaryLinks]="true"
        (pageChange)="navigateToPage($event)"
      ></ngb-pagination>
    </div>
  </div>
</div>
