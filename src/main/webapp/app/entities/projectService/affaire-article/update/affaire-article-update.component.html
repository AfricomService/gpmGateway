<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        id="jhi-affaire-article-heading"
        data-cy="AffaireArticleCreateUpdateHeading"
        jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.home.createOrEditLabel"
      >
        Créer ou éditer un Affaire Article
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" *ngIf="editForm.controls.id.value !== null">
          <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label
            class="form-label"
            jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.quantiteContractuelle"
            for="field_quantiteContractuelle"
            >Quantite Contractuelle</label
          >
          <input
            type="number"
            class="form-control"
            name="quantiteContractuelle"
            id="field_quantiteContractuelle"
            data-cy="quantiteContractuelle"
            formControlName="quantiteContractuelle"
          />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.quantiteRealisee" for="field_quantiteRealisee"
            >Quantite Realisee</label
          >
          <input
            type="number"
            class="form-control"
            name="quantiteRealisee"
            id="field_quantiteRealisee"
            data-cy="quantiteRealisee"
            formControlName="quantiteRealisee"
          />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.affaire" for="field_affaire">Affaire</label>
          <select
            class="form-control"
            id="field_affaire"
            data-cy="affaire"
            name="affaire"
            formControlName="affaire"
            [compareWith]="compareAffaire"
          >
            <option *ngIf="!editForm.get('affaire')!.value" [ngValue]="null" selected></option>
            <option [ngValue]="affaireOption" *ngFor="let affaireOption of affairesSharedCollection">
              {{ affaireOption.designationAffaire }}
            </option>
          </select>
        </div>
        <div *ngIf="editForm.get(['affaire'])!.invalid && (editForm.get(['affaire'])!.dirty || editForm.get(['affaire'])!.touched)">
          <small
            class="form-text text-danger"
            *ngIf="editForm.get(['affaire'])?.errors?.required"
            jhiTranslate="entity.validation.required"
          >
            Ce champ est obligatoire.
          </small>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.article" for="field_article">Article</label>
          <select
            class="form-control"
            id="field_article"
            data-cy="article"
            name="article"
            formControlName="article"
            [compareWith]="compareArticle"
          >
            <option *ngIf="!editForm.get('article')!.value" [ngValue]="null" selected></option>
            <option [ngValue]="articleOption" *ngFor="let articleOption of articlesSharedCollection">{{ articleOption.code }}</option>
          </select>
        </div>
        <div *ngIf="editForm.get(['article'])!.invalid && (editForm.get(['article'])!.dirty || editForm.get(['article'])!.touched)">
          <small
            class="form-text text-danger"
            *ngIf="editForm.get(['article'])?.errors?.required"
            jhiTranslate="entity.validation.required"
          >
            Ce champ est obligatoire.
          </small>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
