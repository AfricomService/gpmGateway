<div>
  <h2 id="page-heading" data-cy="AffaireArticleHeading">
    <span jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.home.title">AffaireArticles</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.home.refreshListLabel">Actualiser la liste</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-affaire-article"
        [routerLink]="['/affaire-article/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.home.createLabel"> Créer un nouveau Affaire Article </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="affaireArticles?.length === 0">
    <span jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.home.notFound">Aucun Affaire Article trouvé</span>
  </div>

  <div class="table-responsive table-entities" id="entities" *ngIf="affaireArticles && affaireArticles.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" (sortChange)="navigateToWithComponentValues()">
          <th scope="col" jhiSortBy="id">
            <div class="d-flex">
              <span jhiTranslate="global.field.id">ID</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="quantiteContractuelle">
            <div class="d-flex">
              <span jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.quantiteContractuelle">Quantite Contractuelle</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="quantiteRealisee">
            <div class="d-flex">
              <span jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.quantiteRealisee">Quantite Realisee</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="affaire.designationAffaire">
            <div class="d-flex">
              <span jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.affaire">Affaire</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="article.code">
            <div class="d-flex">
              <span jhiTranslate="gpmGatewayApp.projectServiceAffaireArticle.article">Article</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let affaireArticle of affaireArticles; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/affaire-article', affaireArticle.id, 'view']">{{ affaireArticle.id }}</a>
          </td>
          <td>{{ affaireArticle.quantiteContractuelle }}</td>
          <td>{{ affaireArticle.quantiteRealisee }}</td>
          <td>
            <div *ngIf="affaireArticle.affaire">
              <a [routerLink]="['/affaire', affaireArticle.affaire.id, 'view']">{{ affaireArticle.affaire.designationAffaire }}</a>
            </div>
          </td>
          <td>
            <div *ngIf="affaireArticle.article">
              <a [routerLink]="['/article', affaireArticle.article.id, 'view']">{{ affaireArticle.article.code }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/affaire-article', affaireArticle.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">Voir</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/affaire-article', affaireArticle.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Editer</span>
              </button>

              <button type="submit" (click)="delete(affaireArticle)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Supprimer</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="affaireArticles && affaireArticles.length > 0">
    <div class="d-flex justify-content-center">
      <jhi-item-count [params]="{ page: page, totalItems: totalItems, itemsPerPage: itemsPerPage }"></jhi-item-count>
    </div>

    <div class="d-flex justify-content-center">
      <ngb-pagination
        [collectionSize]="totalItems"
        [page]="page"
        [pageSize]="itemsPerPage"
        [maxSize]="5"
        [rotate]="true"
        [boundaryLinks]="true"
        (pageChange)="navigateToPage($event)"
      ></ngb-pagination>
    </div>
  </div>
</div>
