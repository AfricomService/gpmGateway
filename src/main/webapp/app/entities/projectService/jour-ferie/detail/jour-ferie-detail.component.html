<div class="d-flex justify-content-center">
  <div class="col-8">
    <div *ngIf="jourFerie">
      <h2 data-cy="jourFerieDetailsHeading"><span jhiTranslate="gpmGatewayApp.projectServiceJourFerie.detail.title">Jour Ferie</span></h2>

      <hr />

      <jhi-alert-error></jhi-alert-error>

      <jhi-alert></jhi-alert>

      <dl class="row-md jh-entity-details">
        <dt><span jhiTranslate="global.field.id">ID</span></dt>
        <dd>
          <span>{{ jourFerie.id }}</span>
        </dd>
        <dt><span jhiTranslate="gpmGatewayApp.projectServiceJourFerie.date">Date</span></dt>
        <dd>
          <span>{{ jourFerie.date | formatMediumDate }}</span>
        </dd>
        <dt><span jhiTranslate="gpmGatewayApp.projectServiceJourFerie.designation">Designation</span></dt>
        <dd>
          <span>{{ jourFerie.designation }}</span>
        </dd>
        <dt><span jhiTranslate="gpmGatewayApp.projectServiceJourFerie.annee">Annee</span></dt>
        <dd>
          <span>{{ jourFerie.annee }}</span>
        </dd>
      </dl>

      <button type="submit" (click)="previousState()" class="btn btn-info" data-cy="entityDetailsBackButton">
        <fa-icon icon="arrow-left"></fa-icon>&nbsp;<span jhiTranslate="entity.action.back">Retour</span>
      </button>

      <button type="button" [routerLink]="['/jour-ferie', jourFerie.id, 'edit']" class="btn btn-primary">
        <fa-icon icon="pencil-alt"></fa-icon>&nbsp;<span jhiTranslate="entity.action.edit">Editer</span>
      </button>
    </div>
  </div>
</div>
