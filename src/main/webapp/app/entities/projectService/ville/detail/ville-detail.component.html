<div class="entity-detail-page py-4" *ngIf="ville as v">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0">{{ v.nom || 'Ville' }}</h3>
      <small class="text-muted">Details ville</small>
    </div>

    <div class="d-flex gap-2">
      <button type="button" (click)="previousState()" class="btn btn-light rounded-3" data-cy="entityDetailsBackButton">Retour</button>
      <button type="button" [routerLink]="['/ville', v.id, 'edit']" class="btn btn-primary rounded-3">Editer</button>
    </div>
  </div>

  <jhi-alert-error></jhi-alert-error>
  <jhi-alert></jhi-alert>

  <ngb-accordion [closeOthers]="false" activeIds="ville-main" class="shadow-sm rounded-4 overflow-hidden">
    <ngb-panel id="ville-main">
      <ng-template ngbPanelTitle>
        <div class="d-flex align-items-center text-primary"><span class="fw-bold">Informations</span></div>
      </ng-template>
      <ng-template ngbPanelContent>
        <div class="row g-3">
          <div class="col-md-6">
            <small class="text-muted">ID</small>
            <div class="fw-semibold">{{ v.id }}</div>
          </div>
          <div class="col-md-6">
            <small class="text-muted">Nom</small>
            <div>{{ v.nom || '-' }}</div>
          </div>
        </div>
      </ng-template>
    </ngb-panel>
  </ngb-accordion>
</div>
