<div>
  <h2 id="page-heading" data-cy="ArticleDemandeAchatHeading">
    <span jhiTranslate="gpmGatewayApp.financeServiceArticleDemandeAchat.home.title">ArticleDemandeAchats</span>

    <div class="d-flex justify-content-end">
      <button class="btn btn-info me-2" (click)="load()" [disabled]="isLoading">
        <fa-icon icon="sync" [spin]="isLoading"></fa-icon>
        <span jhiTranslate="gpmGatewayApp.financeServiceArticleDemandeAchat.home.refreshListLabel">Actualiser la liste</span>
      </button>

      <button
        id="jh-create-entity"
        data-cy="entityCreateButton"
        class="btn btn-primary jh-create-entity create-article-demande-achat"
        [routerLink]="['/article-demande-achat/new']"
      >
        <fa-icon icon="plus"></fa-icon>
        <span jhiTranslate="gpmGatewayApp.financeServiceArticleDemandeAchat.home.createLabel">
          Créer un nouveau Article Demande Achat
        </span>
      </button>
    </div>
  </h2>

  <jhi-alert-error></jhi-alert-error>

  <jhi-alert></jhi-alert>

  <div class="alert alert-warning" id="no-result" *ngIf="articleDemandeAchats?.length === 0">
    <span jhiTranslate="gpmGatewayApp.financeServiceArticleDemandeAchat.home.notFound">Aucun Article Demande Achat trouvé</span>
  </div>

  <div class="table-responsive table-entities" id="entities" *ngIf="articleDemandeAchats && articleDemandeAchats.length > 0">
    <table class="table table-striped" aria-describedby="page-heading">
      <thead>
        <tr jhiSort [(predicate)]="predicate" [(ascending)]="ascending" (sortChange)="navigateToWithComponentValues()">
          <th scope="col" jhiSortBy="id">
            <div class="d-flex">
              <span jhiTranslate="global.field.id">ID</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="qteDemandee">
            <div class="d-flex">
              <span jhiTranslate="gpmGatewayApp.financeServiceArticleDemandeAchat.qteDemandee">Qte Demandee</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="type">
            <div class="d-flex">
              <span jhiTranslate="gpmGatewayApp.financeServiceArticleDemandeAchat.type">Type</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="articleCode">
            <div class="d-flex">
              <span jhiTranslate="gpmGatewayApp.financeServiceArticleDemandeAchat.articleCode">Article Code</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col" jhiSortBy="demandeAchat.code">
            <div class="d-flex">
              <span jhiTranslate="gpmGatewayApp.financeServiceArticleDemandeAchat.demandeAchat">Demande Achat</span>
              <fa-icon class="p-1" icon="sort"></fa-icon>
            </div>
          </th>
          <th scope="col"></th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let articleDemandeAchat of articleDemandeAchats; trackBy: trackId" data-cy="entityTable">
          <td>
            <a [routerLink]="['/article-demande-achat', articleDemandeAchat.id, 'view']">{{ articleDemandeAchat.id }}</a>
          </td>
          <td>{{ articleDemandeAchat.qteDemandee }}</td>
          <td jhiTranslate="{{ 'gpmGatewayApp.TypeArticleDemandeAchat.' + articleDemandeAchat.type }}">{{ articleDemandeAchat.type }}</td>
          <td>{{ articleDemandeAchat.articleCode }}</td>
          <td>
            <div *ngIf="articleDemandeAchat.demandeAchat">
              <a [routerLink]="['/demande-achat', articleDemandeAchat.demandeAchat.id, 'view']">{{
                articleDemandeAchat.demandeAchat.code
              }}</a>
            </div>
          </td>
          <td class="text-end">
            <div class="btn-group">
              <button
                type="submit"
                [routerLink]="['/article-demande-achat', articleDemandeAchat.id, 'view']"
                class="btn btn-info btn-sm"
                data-cy="entityDetailsButton"
              >
                <fa-icon icon="eye"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.view">Voir</span>
              </button>

              <button
                type="submit"
                [routerLink]="['/article-demande-achat', articleDemandeAchat.id, 'edit']"
                class="btn btn-primary btn-sm"
                data-cy="entityEditButton"
              >
                <fa-icon icon="pencil-alt"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.edit">Editer</span>
              </button>

              <button type="submit" (click)="delete(articleDemandeAchat)" class="btn btn-danger btn-sm" data-cy="entityDeleteButton">
                <fa-icon icon="times"></fa-icon>
                <span class="d-none d-md-inline" jhiTranslate="entity.action.delete">Supprimer</span>
              </button>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <div *ngIf="articleDemandeAchats && articleDemandeAchats.length > 0">
    <div class="d-flex justify-content-center">
      <jhi-item-count [params]="{ page: page, totalItems: totalItems, itemsPerPage: itemsPerPage }"></jhi-item-count>
    </div>

    <div class="d-flex justify-content-center">
      <ngb-pagination
        [collectionSize]="totalItems"
        [page]="page"
        [pageSize]="itemsPerPage"
        [maxSize]="5"
        [rotate]="true"
        [boundaryLinks]="true"
        (pageChange)="navigateToPage($event)"
      ></ngb-pagination>
    </div>
  </div>
</div>
