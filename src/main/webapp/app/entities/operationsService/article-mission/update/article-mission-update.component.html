<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        id="jhi-article-mission-heading"
        data-cy="ArticleMissionCreateUpdateHeading"
        jhiTranslate="gpmGatewayApp.operationsServiceArticleMission.home.createOrEditLabel"
      >
        Créer ou éditer un Article Mission
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" *ngIf="editForm.controls.id.value !== null">
          <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="gpmGatewayApp.operationsServiceArticleMission.item" for="field_item">Item</label>
          <input type="number" class="form-control" name="item" id="field_item" data-cy="item" formControlName="item" />
          <div *ngIf="editForm.get('item')!.invalid && (editForm.get('item')!.dirty || editForm.get('item')!.touched)">
            <small class="form-text text-danger" *ngIf="editForm.get('item')?.errors?.required" jhiTranslate="entity.validation.required">
              Ce champ est obligatoire.
            </small>
            <small class="form-text text-danger" [hidden]="!editForm.get('item')?.errors?.number" jhiTranslate="entity.validation.number">
              Ce champ doit être un nombre.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label
            class="form-label"
            jhiTranslate="gpmGatewayApp.operationsServiceArticleMission.quantitePlanifiee"
            for="field_quantitePlanifiee"
            >Quantite Planifiee</label
          >
          <input
            type="number"
            class="form-control"
            name="quantitePlanifiee"
            id="field_quantitePlanifiee"
            data-cy="quantitePlanifiee"
            formControlName="quantitePlanifiee"
          />
          <div
            *ngIf="
              editForm.get('quantitePlanifiee')!.invalid &&
              (editForm.get('quantitePlanifiee')!.dirty || editForm.get('quantitePlanifiee')!.touched)
            "
          >
            <small
              class="form-text text-danger"
              *ngIf="editForm.get('quantitePlanifiee')?.errors?.required"
              jhiTranslate="entity.validation.required"
            >
              Ce champ est obligatoire.
            </small>
            <small
              class="form-text text-danger"
              [hidden]="!editForm.get('quantitePlanifiee')?.errors?.number"
              jhiTranslate="entity.validation.number"
            >
              Ce champ doit être un nombre.
            </small>
          </div>
        </div>

        <div class="row mb-3">
          <label
            class="form-label"
            jhiTranslate="gpmGatewayApp.operationsServiceArticleMission.quantiteRealisee"
            for="field_quantiteRealisee"
            >Quantite Realisee</label
          >
          <input
            type="number"
            class="form-control"
            name="quantiteRealisee"
            id="field_quantiteRealisee"
            data-cy="quantiteRealisee"
            formControlName="quantiteRealisee"
          />
        </div>

        <div class="row mb-3">
          <label
            class="form-label"
            jhiTranslate="gpmGatewayApp.operationsServiceArticleMission.articleCode"
            for="field_articleCode"
            [ngbTooltip]="'gpmGatewayApp.operationsServiceArticleMission.help.articleCode' | translate"
            >Article Code</label
          >
          <input
            type="text"
            class="form-control"
            name="articleCode"
            id="field_articleCode"
            data-cy="articleCode"
            formControlName="articleCode"
          />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="gpmGatewayApp.operationsServiceArticleMission.workOrder" for="field_workOrder"
            >Work Order</label
          >
          <select
            class="form-control"
            id="field_workOrder"
            data-cy="workOrder"
            name="workOrder"
            formControlName="workOrder"
            [compareWith]="compareWorkOrder"
          >
            <option *ngIf="!editForm.get('workOrder')!.value" [ngValue]="null" selected></option>
            <option [ngValue]="workOrderOption" *ngFor="let workOrderOption of workOrdersSharedCollection">{{ workOrderOption.id }}</option>
          </select>
        </div>
        <div *ngIf="editForm.get(['workOrder'])!.invalid && (editForm.get(['workOrder'])!.dirty || editForm.get(['workOrder'])!.touched)">
          <small
            class="form-text text-danger"
            *ngIf="editForm.get(['workOrder'])?.errors?.required"
            jhiTranslate="entity.validation.required"
          >
            Ce champ est obligatoire.
          </small>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
