<div class="d-flex justify-content-center">
  <div class="col-8">
    <form name="editForm" role="form" novalidate (ngSubmit)="save()" [formGroup]="editForm">
      <h2
        id="jhi-wo-motif-heading"
        data-cy="WoMotifCreateUpdateHeading"
        jhiTranslate="gpmGatewayApp.operationsServiceWoMotif.home.createOrEditLabel"
      >
        Créer ou éditer un Wo Motif
      </h2>

      <div>
        <jhi-alert-error></jhi-alert-error>

        <div class="row mb-3" *ngIf="editForm.controls.id.value !== null">
          <label class="form-label" jhiTranslate="global.field.id" for="field_id">ID</label>
          <input type="number" class="form-control" name="id" id="field_id" data-cy="id" formControlName="id" [readonly]="true" />
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="gpmGatewayApp.operationsServiceWoMotif.workOrder" for="field_workOrder">Work Order</label>
          <select
            class="form-control"
            id="field_workOrder"
            data-cy="workOrder"
            name="workOrder"
            formControlName="workOrder"
            [compareWith]="compareWorkOrder"
          >
            <option *ngIf="!editForm.get('workOrder')!.value" [ngValue]="null" selected></option>
            <option [ngValue]="workOrderOption" *ngFor="let workOrderOption of workOrdersSharedCollection">{{ workOrderOption.id }}</option>
          </select>
        </div>
        <div *ngIf="editForm.get(['workOrder'])!.invalid && (editForm.get(['workOrder'])!.dirty || editForm.get(['workOrder'])!.touched)">
          <small
            class="form-text text-danger"
            *ngIf="editForm.get(['workOrder'])?.errors?.required"
            jhiTranslate="entity.validation.required"
          >
            Ce champ est obligatoire.
          </small>
        </div>

        <div class="row mb-3">
          <label class="form-label" jhiTranslate="gpmGatewayApp.operationsServiceWoMotif.motif" for="field_motif">Motif</label>
          <select class="form-control" id="field_motif" data-cy="motif" name="motif" formControlName="motif" [compareWith]="compareMotif">
            <option *ngIf="!editForm.get('motif')!.value" [ngValue]="null" selected></option>
            <option [ngValue]="motifOption" *ngFor="let motifOption of motifsSharedCollection">{{ motifOption.designation }}</option>
          </select>
        </div>
        <div *ngIf="editForm.get(['motif'])!.invalid && (editForm.get(['motif'])!.dirty || editForm.get(['motif'])!.touched)">
          <small class="form-text text-danger" *ngIf="editForm.get(['motif'])?.errors?.required" jhiTranslate="entity.validation.required">
            Ce champ est obligatoire.
          </small>
        </div>
      </div>

      <div>
        <button type="button" id="cancel-save" data-cy="entityCreateCancelButton" class="btn btn-secondary" (click)="previousState()">
          <fa-icon icon="ban"></fa-icon>&nbsp;<span jhiTranslate="entity.action.cancel">Annuler</span>
        </button>

        <button
          type="submit"
          id="save-entity"
          data-cy="entityCreateSaveButton"
          [disabled]="editForm.invalid || isSaving"
          class="btn btn-primary"
        >
          <fa-icon icon="save"></fa-icon>&nbsp;<span jhiTranslate="entity.action.save">Sauvegarder</span>
        </button>
      </div>
    </form>
  </div>
</div>
