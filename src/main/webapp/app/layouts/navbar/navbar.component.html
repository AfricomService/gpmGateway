<nav *ngIf="account !== null" data-cy="navbar" class="navbar navbar-dark bg-primary navbar-expand-md shadow-sm fixed-top">
  <div class="container-fluid">
    <!-- Left Section: Logo -->
    <a class="navbar-brand logo me-3" routerLink="/" (click)="collapseNavbar()">
      <img src="/content/images/logoNavv.png" alt="logo" style="width: 100px" />
    </a>

    <button
      class="navbar-toggler"
      type="button"
      data-toggle="collapse"
      data-target="#navbarResponsive"
      aria-controls="navbarResponsive"
      aria-expanded="false"
      aria-label="Toggle navigation"
      (click)="toggleNavbar()"
    >
      <fa-icon icon="bars"></fa-icon>
    </button>

    <div class="navbar-collapse collapse" id="navbarResponsive" [ngbCollapse]="isNavbarCollapsed" [ngSwitch]="account !== null">
      <!-- Center Section: Main Navigation -->
      <ul class="navbar-nav mx-auto">
        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link" routerLink="/" (click)="collapseNavbar()">
            <fa-icon icon="home" class="me-1"></fa-icon>
            <span jhiTranslate="global.menu.home">Accueil</span>
          </a>
        </li>
        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link" routerLink="work-order" (click)="collapseNavbar()">
            <fa-icon icon="clipboard" class="me-1"></fa-icon>
            <span>Missions</span>
          </a>
        </li>
        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link" routerLink="client" (click)="collapseNavbar()">
            <fa-icon icon="users" class="me-1"></fa-icon>
            <span>Clients</span>
          </a>
        </li>
        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link" routerLink="affaire" (click)="collapseNavbar()">
            <fa-icon icon="folder" class="me-1"></fa-icon>
            <span>Projets</span>
          </a>
        </li>
        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link" routerLink="/ressources/vehicules" (click)="collapseNavbar()">
            <fa-icon icon="truck" class="me-1"></fa-icon>
            <span>Ressources</span>
          </a>
        </li>
        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link" routerLink="facture" (click)="collapseNavbar()">
            <fa-icon icon="file-invoice-dollar" class="me-1"></fa-icon>
            <span>Facturation</span>
          </a>
        </li>
        <li class="nav-item" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <a class="nav-link" routerLink="ot-externe" (click)="collapseNavbar()">
            <fa-icon icon="file-alt" class="me-1"></fa-icon>
            <span>OT Externes</span>
          </a>
        </li>
      </ul>

      <!-- Right Section: Actions & User Profile -->
      <ul class="navbar-nav ms-auto align-items-center">
        <!--        <li class="nav-item me-2">-->
        <!--          <a class="nav-link" href="javascript:void(0);">-->
        <!--            <fa-icon icon="search"></fa-icon>-->
        <!--          </a>-->
        <!--        </li>-->

        <!-- Language -->
        <li ngbDropdown class="nav-item dropdown pointer me-2" display="dynamic" *ngIf="languages && languages.length > 1">
          <a class="nav-link" ngbDropdownToggle href="javascript:void(0);" id="languagesnavBarDropdown">
            <fa-icon icon="flag"></fa-icon>
          </a>
          <ul class="dropdown-menu dropdown-menu-end" ngbDropdownMenu aria-labelledby="languagesnavBarDropdown">
            <li *ngFor="let language of languages">
              <a
                class="dropdown-item"
                [jhiActiveMenu]="language"
                href="javascript:void(0);"
                (click)="changeLanguage(language); collapseNavbar()"
                >{{ language | findLanguageFromKey }}</a
              >
            </li>
          </ul>
        </li>

        <!-- Settings / Admin -->
        <li
          style="border: 0"
          *jhiHasAnyAuthority="'ROLE_ADMIN'"
          ngbDropdown
          class="nav-item dropdown pointer me-3"
          display="dynamic"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          <a class="nav-link" ngbDropdownToggle href="javascript:void(0);" id="admin-menu" data-cy="adminMenu">
            <fa-icon icon="cog"></fa-icon>
          </a>
          <ul class="dropdown-menu dropdown-menu-end" ngbDropdownMenu aria-labelledby="admin-menu">
            <li>
              <a class="dropdown-item" routerLink="admin/gateway" routerLinkActive="active" (click)="collapseNavbar()">
                <fa-icon icon="road" [fixedWidth]="true"></fa-icon>
                <span jhiTranslate="global.menu.admin.gateway">Gateway</span>
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="admin/metrics" routerLinkActive="active" (click)="collapseNavbar()">
                <fa-icon icon="tachometer-alt" [fixedWidth]="true"></fa-icon>
                <span jhiTranslate="global.menu.admin.metrics">Métriques</span>
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="admin/health" routerLinkActive="active" (click)="collapseNavbar()">
                <fa-icon icon="heart" [fixedWidth]="true"></fa-icon>
                <span jhiTranslate="global.menu.admin.health">Diagnostics</span>
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="admin/configuration" routerLinkActive="active" (click)="collapseNavbar()">
                <fa-icon icon="cogs" [fixedWidth]="true"></fa-icon>
                <span jhiTranslate="global.menu.admin.configuration">Configuration</span>
              </a>
            </li>
            <li>
              <a class="dropdown-item" routerLink="admin/logs" routerLinkActive="active" (click)="collapseNavbar()">
                <fa-icon icon="tasks" [fixedWidth]="true"></fa-icon>
                <span jhiTranslate="global.menu.admin.logs">Logs</span>
              </a>
            </li>
            <li *ngIf="openAPIEnabled">
              <a class="dropdown-item" routerLink="admin/docs" routerLinkActive="active" (click)="collapseNavbar()">
                <fa-icon icon="book" [fixedWidth]="true"></fa-icon>
                <span jhiTranslate="global.menu.admin.apidocs">API</span>
              </a>
            </li>
          </ul>
        </li>

        <!-- User Profile & Notifications -->
        <li class="nav-item d-flex align-items-center ps-3 ms-1">
          <!-- Notification Bell -->
          <!--            <div class="position-relative me-3 pointer" style="cursor: pointer">-->
          <!--              <fa-icon icon="bell" class="text-white fa-lg"></fa-icon>-->
          <!--              <span class="position-absolute top-0 start-100 translate-middle p-1 bg-danger border border-light rounded-circle">-->
          <!--                <span class="visually-hidden">New alerts</span>-->
          <!--              </span>-->
          <!--            </div>-->

          <!-- User Profile Dropdown -->
          <div ngbDropdown class="dropdown" display="dynamic">
            <a
              class="nav-link dropdown-toggle p-0 d-flex align-items-center"
              ngbDropdownToggle
              href="javascript:void(0);"
              id="account-menu-desktop"
              data-cy="accountMenu"
            >
              <div class="me-2 text-end d-none d-lg-block" style="line-height: 1.2">
                <span class="d-block fw-bold text-white" style="font-size: 0.9rem">Mohamed Ben Ali</span>
                <small class="text-white-50" style="font-size: 0.75rem">{{ account.login }}</small>
              </div>
              <img
                [src]="account!.imageUrl || 'content/images/jhipster_family_member_0_head-192.png'"
                class="rounded-circle border border-white border-3"
                style="width: 40px; height: 40px; object-fit: cover"
                alt="Avatar"
              />
            </a>
            <ul class="dropdown-menu dropdown-menu-end" ngbDropdownMenu aria-labelledby="account-menu-desktop">
              <li>
                <a class="dropdown-item" (click)="logout()" id="logout-desktop" data-cy="logout">
                  <fa-icon icon="sign-out-alt" [fixedWidth]="true"></fa-icon>
                  <span jhiTranslate="global.menu.account.logout">Déconnexion</span>
                </a>
              </li>
            </ul>
          </div>
        </li>
      </ul>
    </div>
  </div>
</nav>
